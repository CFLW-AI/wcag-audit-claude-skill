<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCAG 2.2-Specific Failures</title>
<!--
GROUND TRUTH - Known WCAG 2.2 AA failures in this page:
1. SC 2.5.8 FAIL: .pagination-dot is 8x8px with no expanded target (needs 24px min)
2. SC 2.5.8 FAIL: .icon-action buttons are 18x18px (needs 24px min)
3. SC 2.5.8 FAIL: .star-rating buttons are 14x14px with 2px gap (needs 24px or adequate spacing)
4. SC 2.4.11 FAIL: .bottom-bar (position:fixed, z-index:50) completely obscures focused inputs in forms that scroll behind it
5. SC 2.5.8 PASS: .nav-link is inline text in a sentence — inline links are exempt from target size
6. SC 2.5.8 PASS: .big-btn is 48x48px — should NOT be flagged
Total: 4 genuine failures, 2 should-pass items
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: #1a1a1a; line-height: 1.6; padding-bottom: 80px; }
  .container { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
  h1 { font-size: 1.8rem; margin-bottom: 24px; }
  h2 { font-size: 1.3rem; margin: 32px 0 12px; }
  p { margin-bottom: 16px; }

  /* Pagination dots — FAIL: 8px targets */
  .pagination { display: flex; gap: 6px; align-items: center; justify-content: center; margin: 24px 0; }
  .pagination-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #cccccc; border: none; cursor: pointer; padding: 0;
  }
  .pagination-dot.active { background: #333333; }

  /* Icon action buttons — FAIL: 18px targets */
  .icon-actions { display: flex; gap: 4px; margin: 20px 0; }
  .icon-action {
    width: 18px; height: 18px; border: 1px solid #cccccc; background: #ffffff;
    border-radius: 4px; cursor: pointer; font-size: 10px; display: flex;
    align-items: center; justify-content: center; padding: 0;
  }

  /* Star rating — FAIL: 14px targets with 2px gaps */
  .star-rating { display: flex; gap: 2px; margin: 16px 0; }
  .star-rating button {
    width: 14px; height: 14px; background: none; border: none; cursor: pointer;
    font-size: 12px; padding: 0; color: #ffa500;
  }

  /* Large button — PASS: should NOT be flagged */
  .big-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: #0066cc; color: #ffffff; border: none; cursor: pointer;
    font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
  }

  /* Bottom bar — FAIL: obscures focused elements */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #ffffff; border-top: 1px solid #eeeeee;
    padding: 16px 24px; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
  }
  .bottom-bar button {
    padding: 10px 24px; background: #0066cc; color: #ffffff;
    border: none; border-radius: 8px; cursor: pointer;
  }

  /* Long form that scrolls behind bottom bar */
  .long-form { margin: 32px 0; }
  .form-field { margin-bottom: 16px; }
  .form-field label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.9rem; }
  .form-field input, .form-field textarea {
    width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 6px;
  }

  :focus-visible { outline: 2px solid #0066cc; outline-offset: 2px; }
</style>
</head>
<body>
<div class="container">
  <h1>Product Review Page</h1>

  <h2>Image Gallery</h2>
  <p>Navigate between images using the dots below:</p>
  <!-- FAIL: 8px dots, no expanded target -->
  <div class="pagination">
    <button class="pagination-dot active" aria-label="Image 1"></button>
    <button class="pagination-dot" aria-label="Image 2"></button>
    <button class="pagination-dot" aria-label="Image 3"></button>
    <button class="pagination-dot" aria-label="Image 4"></button>
    <button class="pagination-dot" aria-label="Image 5"></button>
  </div>

  <h2>Quick Actions</h2>
  <!-- FAIL: 18px buttons -->
  <div class="icon-actions">
    <button class="icon-action" aria-label="Bookmark">🔖</button>
    <button class="icon-action" aria-label="Share">↗</button>
    <button class="icon-action" aria-label="Flag">⚑</button>
    <button class="icon-action" aria-label="Print">🖨</button>
  </div>

  <h2>Your Rating</h2>
  <!-- FAIL: 14px star buttons with tiny gaps -->
  <div class="star-rating">
    <button aria-label="1 star">★</button>
    <button aria-label="2 stars">★</button>
    <button aria-label="3 stars">★</button>
    <button aria-label="4 stars">★</button>
    <button aria-label="5 stars">★</button>
  </div>

  <h2>Add to Cart</h2>
  <!-- PASS: large enough target -->
  <button class="big-btn" aria-label="Add to cart">+</button>

  <p>You can also visit our <a href="/faq" class="nav-link">frequently asked questions</a> page for more details about this product and our return policy.</p>

  <h2>Write a Review</h2>
  <!-- Form that will scroll behind the fixed bottom bar -->
  <div class="long-form">
    <div class="form-field"><label for="name">Your Name</label><input type="text" id="name"></div>
    <div class="form-field"><label for="title">Review Title</label><input type="text" id="title"></div>
    <div class="form-field"><label for="pros">What did you like?</label><textarea id="pros" rows="3"></textarea></div>
    <div class="form-field"><label for="cons">What could improve?</label><textarea id="cons" rows="3"></textarea></div>
    <div class="form-field"><label for="recommend">Would you recommend?</label><input type="text" id="recommend"></div>
    <div class="form-field"><label for="detail">Detailed Review</label><textarea id="detail" rows="6"></textarea></div>
  </div>
</div>

<!-- FAIL: Fixed bottom bar obscures focused elements in the form above -->
<div class="bottom-bar">
  <span style="font-size:0.9rem; color:#666;">Ready to submit?</span>
  <button>Submit Review</button>
</div>
</body>
</html>
